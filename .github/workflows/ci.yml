name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Cache MoonBit dependencies
        uses: actions/cache@v5
        with:
          path: ~/.moon/registry
          key: moonbit-deps-${{ hashFiles('moon.mod.json') }}
          restore-keys: moonbit-deps-

      - name: Install dependencies
        run: moon update && moon install

      - name: Format check
        run: moon fmt --check

      - name: Type check (warnings as errors)
        run: moon check --target native --deny-warn

      - name: Build
        run: moon build --target native

      - name: Test (excluding P2P)
        run: |
          moon test --target native -p duobei/cub/app -p duobei/cub/config -p duobei/cub/core -p duobei/cub/crypto -p duobei/cub/ext -p duobei/cub/llm -p duobei/cub/log -p duobei/cub/mcp -p duobei/cub/skills -p duobei/cub/tape -p duobei/cub/tools
          moon test --target native -p duobei/cub/channels -f discord_test.mbt
          moon test --target native -p duobei/cub/channels -f telegram_test.mbt
        timeout-minutes: 10
